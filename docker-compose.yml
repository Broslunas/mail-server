services:
  wildduck:
    image: nodemailer/wildduck:latest
    container_name: wildduck
    restart: unless-stopped
    # Limits for Oracle Free Tier micro VM (1 GB RAM total)
    # WildDuck + Node.js + TLS fits in ~500-700 MB
    mem_limit: 700m
    mem_reservation: 400m
    cpus: 0.7
    # Direct ports on the Oracle VM (NOT tunneled — see docs/DNS.md)
    # Cloudflare Tunnel is only used for the REST API (port 8080)
    ports:
      - "8080:8080"   # REST API (used by Next.js webmail via Cloudflare Tunnel or direct)
      - "993:993"     # IMAPS
      - "995:995"     # POP3S
      - "587:587"     # SMTP submission (STARTTLS)
      - "143:143"     # IMAP (plaintext, STARTTLS upgrade)
      - "110:110"     # POP3 (plaintext, STARTTLS upgrade)
    environment:
      # WildDuck reads its config from /etc/wildduck/wildduck.yml
      # and overrides values from these env vars.
      # The custom env prefix for wildduck config is WILDDUCK_*
      # MongoDB connection (uses external Atlas free M0 — keeps state outside the small VM)
      - WILDDUCK_MONGO_URL=mongodb://${MONGODB_USER}:${MONGODB_PASS}@${MONGODB_HOST}/${MONGODB_DB}?ssl=true&retryWrites=true&w=majority
      - WILDDUCK_MONGO_DB=${MONGODB_DB}
      # Public host (FQDN clients connect to)
      - WILDDUCK_HOST=${MAIL_FQDN}
      # TLS certificates (mounted from ./wildduck/tls)
      - WILDDUCK_TLS_KEY=/tls/tls.key
      - WILDDUCK_TLS_CERT=/tls/tls.crt
      - WILDDUCK_TLS_DHPARAM=/tls/dhparam.pem
      # WildDuck admin API key (generate with: openssl rand -hex 32)
      - WILDDUCK_API_KEY=${WILDDUCK_API_KEY}
      # Mailbox defaults
      - WILDDUCK_MAILBOX_DEFAULT_QUOTA=${DEFAULT_QUOTA:-104857600}
      - WILDDUCK_MAILBOX_DEFAULT_MAX_MESSAGES=${DEFAULT_MAX_MESSAGES:-50000}
      # Logging
      - NODE_ENV=production
      - WILDDUCK_LOG_LEVEL=info
    volumes:
      - ./wildduck/wildduck.yml:/etc/wildduck/wildduck.yml:ro
      - ./wildduck/tls:/tls:ro
      - ./wildduck/dkim:/dkim:ro
    networks:
      - mailnet
    healthcheck:
      # WildDuck exposes /health on the API port (8080) by default
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  mailnet:
    driver: bridge
